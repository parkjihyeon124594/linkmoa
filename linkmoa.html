<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>Linkmoa</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./linkmoastyle.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="header_banner">
      <nav class="header_menu">
        <div class="logo">
          <div>
            <a href="https://www.naver.com">
              <img class="logo_image" src="./logo_image3.png" />
            </a>
          </div>
          <div>
            <img class="logo_name" src="./logo_name.png" />
          </div>
        </div>

        <div class="header_btn">
          <button
            id="registeration_btn"
            style="margin-right: 5px"
            onclick="registeration_page()"
          >
            회원가입
          </button>
          <button id="login_btn" onclick="login_page()">로그인</button>
        </div>
        <div class="header_btn">
          <input
            type="image"
            name="button"
            src="./menu2.png"
            width="30px"
            height="30px"
            style="margin-left: 10px"
            onclick="registeration_page()"
          />
        </div>
      </nav>
    </div>
    <hr />
    <span id="link_container">
      <button id="add_btn" onclick="openMenubar()">+</button>
      <ul id="menubars">
        <li><buttoㅎn id="make_dir">폴더 생성</button></li>
        <li><button id="make_link">링크 생성</button></li>
      </ul>
    </span>
        <div id="sort_box">
      <div id="sort">
        <button class="sort_opt non-click">날짜</button>
        <button class="sort_opt non-click" style="margin-left: 4px">
          이름
        </button>
      </div>
    </div>
    <div id="directory">
      <span id="link_container">
        <button id="add_btn" onclick="createDir()"></button>
      </span>
    </div>
  </body>
</html>
